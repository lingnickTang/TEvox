    \ == nullptr || strcmp(transport->valuestring, \"websocket\") != 0) {\n      \
    \  ESP_LOGE(TAG, \"Unsupported transport: %s\", transport->valuestring);\n   \
    \     return;\n    }\n\n    auto session_id = cJSON_GetObjectItem(root, \"session_id\"\
    );\n    if (cJSON_IsString(session_id)) {\n        session_id_ = session_id->valuestring;\n\
    \        ESP_LOGI(TAG, \"Session ID: %s\", session_id_.c_str());\n    }\n\n  \
    \  auto audio_params = cJSON_GetObjectItem(root, \"audio_params\");\n    if (cJSON_IsObject(audio_params))\
    \ {\n        auto sample_rate = cJSON_GetObjectItem(audio_params, \"sample_rate\"\
    );\n        if (cJSON_IsNumber(sample_rate)) {\n            server_sample_rate_\
    \ = sample_rate->valueint;\n        }\n        auto frame_duration = cJSON_GetObjectItem(audio_params,\
    \ \"frame_duration\");\n        if (cJSON_IsNumber(frame_duration)) {\n      \
    \      server_frame_duration_ = frame_duration->valueint;\n        }\n    }\n\n\
    \    xEventGroupSetBits(event_group_handle_, WEBSOCKET_PROTOCOL_SERVER_HELLO_EVENT);\n\
    }"
  description: The `ParseServerHello` function processes the server's initial handshake
    response in a WebSocket connection, extracting and storing session identification
    and audio configuration parameters such as sample rate and frame duration. It
    validates the transport type and sets an event flag upon successful parsing to
    signal readiness for further communication. This enables the device to configure
    its audio streaming settings based on server-provided specifications.
