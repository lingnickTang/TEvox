  description: The `Esp32Camera::Capture()` function captures a single video frame
    from the camera hardware and stores it in memory, handling buffer management and
    optional format conversion. It ensures proper synchronization by waiting for any
    previous encoding tasks to complete and manages memory allocation for the captured
    frame, particularly when storing a copy in PSRAM. The function supports multiple
    pixel formats and includes error handling for buffer operations and memory allocation
    failures.
