    \     if (json.length() + tool_json.length() + 30 > max_payload_size) {\n    \
    \        // 如果添加这个tool会超出大小限制，设置next_cursor并退出循环\n            next_cursor = (*it)->name();\n\
    \            break;\n        }\n        \n        json += tool_json;\n       \
    \ ++it;\n    }\n    \n    if (json.back() == ',') {\n        json.pop_back();\n\
