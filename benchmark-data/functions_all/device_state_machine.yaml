  ground_truth: "bool DeviceStateMachine::IsValidTransition(DeviceState from, DeviceState\
    \ to) const {\n    // Allow transition to the same state (no-op)\n    if (from\
    \ == to) {\n        return true;\n    }\n\n    // Define valid state transitions\
