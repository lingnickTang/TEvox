  graph-5-5: "#include \"driver/i2s_std.h\"\n#include \"driver/i2s_tdm.h\"\n#include\
    \ \"esp_log.h\"\n\nstatic const char *TAG = \"CreateDuplexChannels\";\n\nesp_err_t\
    \ CreateDuplexChannels(\n    gpio_num_t mclk,\n    gpio_num_t bclk,\n    gpio_num_t\
    \ ws,\n    gpio_num_t dout,\n    gpio_num_t din)\n{\n    // Common I2S channel\
    \ configuration\n    i2s_chan_config_t chan_cfg = I2S_CHANNEL_DEFAULT_CONFIG(I2S_NUM_AUTO,\
    \ I2S_ROLE_MASTER);\n    chan_cfg.dma_desc_num = 8;\n    chan_cfg.dma_frame_num\
    \ = 256;\n\n    // Create TX channel\n    i2s_chan_handle_t tx_handle = NULL;\n\
    \    esp_err_t ret = i2s_new_channel(&chan_cfg, &tx_handle, NULL);\n    if (ret\
    \ != ESP_OK || !tx_handle) {\n        ESP_LOGE(TAG, \"Failed to create TX channel\"\
    );\n        return ret;\n    }\n\n    // Standard mode config for TX\n    i2s_std_config_t\
    \ std_cfg = {\n        .clk_cfg = I2S_STD_CLK_DEFAULT_CONFIG(48000), // Assume\
    \ 48kHz sample rate\n        .slot_cfg = I2S_STD_PHILIP_SLOT_DEFAULT_CONFIG(I2S_DATA_BIT_WIDTH_16BIT,\
    \ I2S_SLOT_MODE_STEREO),\n        .gpio_cfg = {\n            .mclk = mclk,\n \
    \           .bclk = bclk,\n            .ws = ws,\n            .dout = dout,\n\
    \            .din = I2S_GPIO_UNUSED,\n            .invert_flags = {\n        \
    \        .mclk_inv = false,\n                .bclk_inv = false,\n            \
    \    .ws_inv = false,\n            },\n        },\n    };\n\n    ret = i2s_channel_init_std_mode(tx_handle,\
    \ &std_cfg);\n    if (ret != ESP_OK) {\n        ESP_LOGE(TAG, \"Failed to initialize\
    \ TX channel in standard mode\");\n        i2s_del_channel(tx_handle);\n     \
    \   return ret;\n    }\n\n    // Create RX channel\n    i2s_chan_handle_t rx_handle\
    \ = NULL;\n    ret = i2s_new_channel(&chan_cfg, NULL, &rx_handle);\n    if (ret\
    \ != ESP_OK || !rx_handle) {\n        ESP_LOGE(TAG, \"Failed to create RX channel\"\
    );\n        i2s_del_channel(tx_handle);\n        return ret;\n    }\n\n    //\
    \ TDM mode config for RX\n    i2s_tdm_config_t tdm_cfg = {\n        .clk_cfg =\
    \ I2S_TDM_CLK_DEFAULT_CONFIG(48000), // Same sample rate\n        .slot_cfg =\
    \ I2S_TDM_PHILIP_SLOT_DEFAULT_CONFIG(I2S_DATA_BIT_WIDTH_16BIT, I2S_SLOT_MODE_STEREO,\
    \ I2S_TDM_SLOT0 | I2S_TDM_SLOT1),\n        .gpio_cfg = {\n            .mclk =\
    \ mclk,\n            .bclk = bclk,\n            .ws = ws,\n            .dout =\
    \ I2S_GPIO_UNUSED,\n            .din = din,\n            .invert_flags = {\n \
    \               .mclk_inv = false,\n                .bclk_inv = false,\n     \
    \           .ws_inv = false,\n            },\n        },\n    };\n\n    ret =\
    \ i2s_channel_init_tdm_mode(rx_handle, &tdm_cfg);\n    if (ret != ESP_OK) {\n\
    \        ESP_LOGE(TAG, \"Failed to initialize RX channel in TDM mode\");\n   \
    \     i2s_del_channel(tx_handle);\n        i2s_del_channel(rx_handle);\n     \
    \   return ret;\n    }\n\n    ESP_LOGI(TAG, \"Duplex channels created\");\n\n\
    \    // At this point, tx_handle and rx_handle are ready for use elsewhere\n \
