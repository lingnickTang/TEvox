  tools-small-96;: "void Es8388AudioCodec::CreateDuplexChannels(gpio_num_t mclk, gpio_num_t\
    \ bclk, gpio_num_t ws, gpio_num_t dout, gpio_num_t din)\n{\n    // Configure I2S\
    \ master mode for full-duplex operation\n    i2s_config_t i2s_config = {\n   \
    \     .mode = (i2s_mode_t)(I2S_MODE_MASTER | I2S_MODE_TX | I2S_MODE_RX),\n   \
    \     .sample_rate = input_sample_rate_,  // Use input sample rate for consistency\n\
    \        .bits_per_sample = I2S_BITS_PER_SAMPLE_16BIT,\n        .channel_format\
    \ = I2S_CHANNEL_FMT_RIGHT_LEFT,\n        .communication_format = (i2s_comm_format_t)(I2S_COMM_FORMAT_I2S\
    \ | I2S_COMM_FORMAT_I2S_MSB),\n        .dma_buf_count = 8,\n        .dma_buf_len\
    \ = 64,\n        .use_apll = false,\n        .tx_desc_auto_clear = true,\n   \
    \     .fixed_mclk = 0,\n        .mclk_multiple = I2S_MCLK_MULT_256,\n        .bits_per_chan\
    \ = I2S_BITS_PER_CHAN_16BIT,\n    };\n\n    // Configure I2S pin configuration\n\
    \    i2s_pin_config_t pin_config = {\n        .bck_io_num = bclk,\n        .ws_io_num\
    \ = ws,\n        .data_out_num = dout,\n        .data_in_num = din,\n    };\n\n\
    \    // Install and start I2S driver\n    ESP_ERROR_CHECK(i2s_driver_install(I2S_NUM_0,\
    \ &i2s_config, 0, NULL));\n    \n    // Set up I2S pins\n    ESP_ERROR_CHECK(i2s_set_pin(I2S_NUM_0,\
    \ &pin_config));\n    \n    // Set MCLK pin as output and configure it\n    if\
    \ (mclk != GPIO_NUM_NC) {\n        gpio_config_t mclk_config = {\n           \
    \ .pin_bit_mask = (1ULL << mclk),\n            .mode = GPIO_MODE_OUTPUT,\n   \
    \         .pull_up_en = GPIO_PULLUP_DISABLE,\n            .pull_down_en = GPIO_PULLDOWN_DISABLE,\n\
