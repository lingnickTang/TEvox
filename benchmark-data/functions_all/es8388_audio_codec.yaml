    }"
  graph-small-5-5: "/**\n * Creates duplex I2S channels for audio codec initialization\n\
    \ * \n * This function initializes both transmit and receive I2S channels for\
    \ full-duplex audio\n * operation. It configures the I2S peripheral with standard\
    \ mode for TX and TDM mode for RX,\n * using the provided GPIO pins for clock\
    \ and data signals.\n * \n * @param mclk Master clock pin number\n * @param bclk\
    \ Bit clock pin number\n * @param ws Word select (LRCLK) pin number\n * @param\
    \ dout Digital output pin number\n * @param din Digital input pin number\n * @return\
    \ esp_err_t ESP_OK on success, error code otherwise\n */\nesp_err_t Es8388AudioCodec::CreateDuplexChannels(gpio_num_t\
    \ mclk, gpio_num_t bclk, gpio_num_t ws, gpio_num_t dout, gpio_num_t din)\n{\n\
    \    // Assert that input and output sample rates are equal\n    assert(input_sample_rate_\
    \ == output_sample_rate_);\n    \n    // Configure I2S channel for standard mode\
    \ (TX)\n    i2s_chan_config_t chan_cfg = I2S_CHANNEL_DEFAULT_CONFIG(I2S_NUM_0,\
    \ I2S_ROLE_MASTER);\n    chan_cfg.dma_desc_num = 8;\n    chan_cfg.dma_frame_num\
    \ = 64;\n    chan_cfg.flags.use_apll = true;\n    chan_cfg.flags.bck_inverted\
    \ = false;\n    chan_cfg.flags.ws_inverted = false;\n    \n    // Initialize TX\
    \ channel\n    esp_err_t ret = i2s_new_channel(&chan_cfg, &tx_handle_, NULL);\n\
    \    if (ret != ESP_OK) {\n        return ret;\n    }\n    \n    // Configure\
    \ TX channel in standard mode (stereo)\n    i2s_std_config_t std_cfg = I2S_STD_CONFIG_DEFAULT(input_sample_rate_,\
    \ I2S_DATA_BIT_WIDTH_16BIT, I2S_SLOT_MODE_STEREO);\n    std_cfg.clk_cfg.mclk_freq_hz\
    \ = input_sample_rate_ * 256;  // MCLK = 256 * sample rate\n    std_cfg.clk_cfg.clk_src\
    \ = I2S_CLK_SRC_APLL;\n    std_cfg.slot_cfg.slot_bit_width = I2S_DATA_BIT_WIDTH_16BIT;\n\
    \    std_cfg.slot_cfg.slot_mode = I2S_SLOT_MODE_STEREO;\n    std_cfg.slot_cfg.channel_mask\
    \ = I2S_STD_SLOT_LEFT | I2S_STD_SLOT_RIGHT;\n    std_cfg.gpio_cfg.mclk = mclk;\n\
    \    std_cfg.gpio_cfg.bclk = bclk;\n    std_cfg.gpio_cfg.ws = ws;\n    std_cfg.gpio_cfg.dout\
    \ = dout;\n    std_cfg.gpio_cfg.din = I2S_GPIO_NO_CONNECT;\n    std_cfg.gpio_cfg.mclk\
    \ = mclk;\n    \n    ret = i2s_channel_init_std_mode(tx_handle_, &std_cfg);\n\
    \    if (ret != ESP_OK) {\n        i2s_del_channel(tx_handle_);\n        return\
    \ ret;\n    }\n    \n    // Configure RX channel in TDM mode\n    i2s_tdm_config_t\
    \ tdm_cfg = I2S_TDM_CONFIG_DEFAULT();\n    tdm_cfg.clk_cfg.mclk_freq_hz = input_sample_rate_\
    \ * 256;\n    tdm_cfg.clk_cfg.clk_src = I2S_CLK_SRC_APLL;\n    tdm_cfg.slot_cfg.slot_bit_width\
    \ = I2S_DATA_BIT_WIDTH_16BIT;\n    tdm_cfg.slot_cfg.slot_mode = I2S_SLOT_MODE_STEREO;\n\
    \    tdm_cfg.slot_cfg.channel_mask = I2S_TDM_SLOT0 | I2S_TDM_SLOT1;\n    tdm_cfg.slot_cfg.tdm_slot_num\
    \ = 2;\n    tdm_cfg.gpio_cfg.mclk = mclk;\n    tdm_cfg.gpio_cfg.bclk = bclk;\n\
    \    tdm_cfg.gpio_cfg.ws = ws;\n    tdm_cfg.gpio_cfg.dout = I2S_GPIO_NO_CONNECT;\n\
    \    tdm_cfg.gpio_cfg.din = din;\n    \n    ret = i2s_new_channel(&chan_cfg, NULL,\
    \ &rx_handle_);\n    if (ret != ESP_OK) {\n        i2s_del_channel(tx_handle_);\n\
    \        return ret;\n    }\n    \n    ret = i2s_channel_init_tdm_mode(rx_handle_,\
    \ &tdm_cfg);\n    if (ret != ESP_OK) {\n        i2s_del_channel(tx_handle_);\n\
    \        i2s_del_channel(rx_handle_);\n        return ret;\n    }\n    \n    return\
    \ ESP_OK;\n}"
  Desc+without: "esp_err_t CreateDuplexChannels(gpio_num_t bck_pin, gpio_num_t ws_pin,\
    \ gpio_num_t data_out_pin, gpio_num_t data_in_pin, gpio_num_t mclk_pin)\n{\n \
    \   // Configure I2S driver for full-duplex operation\n    i2s_driver_config_t\
    \ i2s_config = {\n        .mode = (i2s_mode_t)(I2S_MODE_MASTER | I2S_MODE_TX |\
    \ I2S_MODE_RX),\n        .sample_rate = 44100,\n        .bits_per_sample = I2S_BITS_PER_SAMPLE_16BIT,\n\
    \        .channel_format = I2S_CHANNEL_FMT_RIGHT_LEFT,\n        .communication_format\
    \ = I2S_COMM_FORMAT_I2S,\n        .intr_alloc_flags = 0,\n        .dma_buf_count\
    \ = 8,\n        .dma_buf_len = 64,\n        .use_apll = true,\n        .tx_desc_auto_clear\
    \ = true,\n        .fixed_mclk = 0,\n        .mclk_multiple = I2S_MCLK_MULTIPLE_256,\n\
    \        .bits_per_chan = I2S_BITS_PER_CHAN_16BIT,\n    };\n\n    // Install and\
    \ start I2S driver\n    esp_err_t ret = i2s_driver_install(I2S_NUM_0, &i2s_config,\
    \ 0, NULL);\n    if (ret != ESP_OK) {\n        return ret;\n    }\n\n    // Configure\
    \ I2S pin mapping\n    i2s_pin_config_t pin_config = {\n        .mck_io_num =\
    \ mclk_pin,\n        .bck_io_num = bck_pin,\n        .ws_io_num = ws_pin,\n  \
    \      .data_out_num = data_out_pin,\n        .data_in_num = data_in_pin\n   \
    \ };\n\n    ret = i2s_set_pin(I2S_NUM_0, &pin_config);\n    if (ret != ESP_OK)\
    \ {\n        i2s_driver_uninstall(I2S_NUM_0);\n        return ret;\n    }\n\n\
    \    // Set clock configuration\n    ret = i2s_set_clk(I2S_NUM_0, 44100, I2S_BITS_PER_SAMPLE_16BIT,\
    \ I2S_CHANNEL_STEREO);\n    if (ret != ESP_OK) {\n        i2s_driver_uninstall(I2S_NUM_0);\n\
    \        return ret;\n    }\n\n    // Zero-initialize the DMA buffers to prevent\
    \ noise\n    i2s_zero_dma_buffer(I2S_NUM_0);\n\n    return ESP_OK;\n}"
