  eg;: "#include \"driver/i2s_std.h\"\n#include \"es8388_audio_codec.h\"\n\nesp_err_t\
    \ CreateDuplexChannels(gpio_num_t bck, gpio_num_t ws, gpio_num_t dout, gpio_num_t\
    \ din, gpio_num_t mck) {\n    i2s_chan_handle_t tx_handle = NULL;\n    i2s_chan_handle_t\
    \ rx_handle = NULL;\n\n    // Step 1: Configure I2S channel configurations\n \
    \   i2s_std_config_t std_cfg = {\n        .clk_cfg = I2S_STD_CLK_DEFAULT_CONFIG(24000),\
    \ // 24kHz sample rate\n        .slot_cfg = I2S_STD_PHILIP_SLOT_DEFAULT_CONFIG(I2S_DATA_BIT_WIDTH_16BIT,\
    \ I2S_SLOT_MODE_STEREO),\n        .gpio_cfg = {\n            .mclk = mck,\n  \
    \          .bclk = bck,\n            .ws = ws,\n            .dout = dout,\n  \
    \          .din = din,\n            .invert_flags = {\n                .mclk_inv\
    \ = false,\n                .bclk_inv = false,\n                .ws_inv = false,\n\
    \            },\n        },\n    };\n\n    // Step 2: Initialize I2S controller\
    \ in duplex mode\n    i2s_new_channel(&std_cfg, &tx_handle, &rx_handle);\n\n \
    \   if (tx_handle == NULL || rx_handle == NULL) {\n        return ESP_FAIL;\n\
    \    }\n\n    // Step 3: Enable both TX and RX channels\n    i2s_channel_enable(tx_handle);\n\
    \    i2s_channel_enable(rx_handle);\n\n    return ESP_OK;\n}"
