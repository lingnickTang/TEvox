    \ &tx_cfg, &tx_handle_, NULL));\n    \n    // Install I2S RX channel\n    ESP_ERROR_CHECK(i2s_new_channel(I2S_NUM_0,\
    \ &tx_cfg, NULL, &rx_handle_));\n}"
