    \                  gpio_num_t mclk, gpio_num_t bclk, gpio_num_t ws, gpio_num_t\
    \ dout, gpio_num_t din, gpio_num_t pa_pin,\n                                 \
    \  uint8_t address, bool input_reference)\n    : input_sample_rate_(input_sample_rate)\n\
    \    , output_sample_rate_(output_sample_rate)\n    , input_channels_(input_reference\
