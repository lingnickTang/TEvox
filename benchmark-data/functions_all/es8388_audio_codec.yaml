    \        // Initialize MCLK to low state\n        gpio_set_level(mclk, 0);\n \
    \   }\n    \n    // Get handles for RX and TX\n    rx_handle_ = (void*)I2S_NUM_0;\n\
    \    tx_handle_ = (void*)I2S_NUM_0;\n}"
  tools-96;: "void Es8388AudioCodec::CreateDuplexChannels(gpio_num_t mclk, gpio_num_t\
    \ bclk, gpio_num_t ws, gpio_num_t dout, gpio_num_t din)\n{\n    // Configure I2S\
    \ clock configuration\n    i2s_std_clk_config_t clk_cfg = {\n        .clk_src\
    \ = I2S_CLK_SRC_DEFAULT,\n        .mclk_multiple = I2S_MCLK_MULTIPLE_256,\n  \
    \      .div = 1\n    };\n\n    // Configure I2S slot configuration for 16-bit\
    \ stereo\n    i2s_std_slot_config_t slot_cfg = {\n        .data_bit_width = I2S_DATA_BIT_WIDTH_16BIT,\n\
    \        .slot_bit_width = I2S_SLOT_BIT_WIDTH_AUTO,\n        .slot_mode = I2S_SLOT_MODE_STEREO,\n\
    \        .slot_mask = I2S_STD_SLOT_BOTH,\n        .ws_width = I2S_DATA_BIT_WIDTH_16BIT,\n\
    \        .ws_pol = false,\n        .bit_shift = false,\n        .msb_right = false,\n\
    \        .lnr_align = false,\n        .auto_clear = false\n    };\n\n    // Configure\
    \ GPIO pins for I2S\n    i2s_std_gpio_config_t gpio_cfg = {\n        .mclk = mclk,\n\
    \        .bclk = bclk,\n        .ws = ws,\n        .dout = dout,\n        .din\
    \ = din,\n        .invert_flags = {\n            .mclk_inv = false,\n        \
    \    .bclk_inv = false,\n            .ws_inv = false\n        }\n    };\n\n  \
    \  // Configure I2S master transmission channel\n    i2s_std_config_t tx_cfg =\
