    \    codec_dev_.i2c_master_handle = i2c_master_handle_;\n    \n    // Initialize\
    \ GPIO pins\n    if (pa_pin_ != GPIO_NUM_NC) {\n        gpio_config_t io_conf\
    \ = {};\n        io_conf.pin_bit_mask = (1ULL << pa_pin_);\n        io_conf.mode\
    \ = GPIO_MODE_OUTPUT;\n        io_conf.pull_up_en = GPIO_PULLUP_DISABLE;\n   \
    \     io_conf.pull_down_en = GPIO_PULLDOWN_DISABLE;\n        io_conf.intr_type\
    \ = GPIO_INTR_DISABLE;\n        gpio_config(&io_conf);\n        gpio_set_level(pa_pin_,\
    \ 0); // Initially off\n    }\n    \n    if (reset_pin_ != GPIO_NUM_NC) {\n  \
    \      gpio_config_t io_conf = {};\n        io_conf.pin_bit_mask = (1ULL << reset_pin_);\n\
    \        io_conf.mode = GPIO_MODE_OUTPUT;\n        io_conf.pull_up_en = GPIO_PULLUP_DISABLE;\n\
    \        io_conf.pull_down_en = GPIO_PULLDOWN_DISABLE;\n        io_conf.intr_type\
    \ = GPIO_INTR_DISABLE;\n        gpio_config(&io_conf);\n        gpio_set_level(reset_pin_,\
