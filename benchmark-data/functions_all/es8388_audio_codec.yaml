  tools-small: "// Constructor implementation pattern for audio codec classes\nEs8388AudioCodec::Es8388AudioCodec(void*\
    \ i2c_master_handle, i2c_port_t i2c_port, int input_sample_rate, int output_sample_rate,\n\
    \    gpio_num_t mclk, gpio_num_t bclk, gpio_num_t ws, gpio_num_t dout, gpio_num_t\
    \ din,\n    gpio_num_t pa_pin, uint8_t es8388_addr, bool input_reference)\n  \
    \  : AudioCodec(input_sample_rate, output_sample_rate, input_reference),\n   \
    \   pa_pin_(pa_pin)\n{\n    // Initialize codec interfaces\n    codec_if_ = audio_codec_get_codec_if();\n\
    \    ctrl_if_ = audio_codec_get_ctrl_if();\n    data_if_ = audio_codec_get_data_if();\n\
    \    gpio_if_ = audio_codec_get_gpio_if();\n\n    // Initialize I2C master handle\
    \ and device handles\n    i2c_master_config_t i2c_cfg = {\n        .i2c_port =\
    \ i2c_port,\n        .i2c_master_handle = i2c_master_handle,\n        .codec_i2c_addr\
    \ = es8388_addr,\n    };\n\n    // Configure I2C communication\n    ESP_ERROR_CHECK(i2c_master_init(&i2c_cfg));\n\
    \n    // Initialize codec device\n    esp_codec_dev_cfg_t codec_cfg = {\n    \
    \    .dev_type = ESP_CODEC_DEV_TYPE_OUT,\n        .codec_if = codec_if_,\n   \
    \     .ctrl_if = ctrl_if_,\n        .data_if = data_if_,\n        .gpio_if = gpio_if_,\n\
    \        .i2c_cfg = {\n            .port = i2c_port,\n            .addr = es8388_addr,\n\
    \            .master_handle = i2c_master_handle,\n        },\n    };\n\n    //\
    \ Create input device\n    esp_codec_dev_cfg_t input_cfg = codec_cfg;\n    input_cfg.dev_type\
    \ = ESP_CODEC_DEV_TYPE_IN;\n    ESP_ERROR_CHECK(esp_codec_dev_new(&input_cfg,\
    \ &input_dev_));\n\n    // Create output device\n    esp_codec_dev_cfg_t output_cfg\
    \ = codec_cfg;\n    output_cfg.dev_type = ESP_CODEC_DEV_TYPE_OUT;\n    ESP_ERROR_CHECK(esp_codec_dev_new(&output_cfg,\
    \ &output_dev_));\n\n    // Set default values\n    input_gain_ = 0;\n    output_volume_\
    \ = 0;\n    input_channels_ = 2;\n    output_channels_ = 1;\n    input_enabled_\
    \ = false;\n    output_enabled_ = false;\n}"
