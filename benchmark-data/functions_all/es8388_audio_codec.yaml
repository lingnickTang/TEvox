  Desc+workflow: "void EnableOutput(bool enable) {\n    std::lock_guard<std::mutex>\
    \ lock(data_if_mutex_);\n\n    if (enable) {\n        // Avoid re-initializing\
    \ if already enabled\n        if (output_dev_ != nullptr) {\n            return;\n\
    \        }\n\n        // Validate sample rate\n        if (output_sample_rate_\
    \ != 24000) {\n            ESP_LOGW(\"ES8388\", \"Non-standard output sample rate\
    \ used: %d Hz\", output_sample_rate_);\n        }\n\n        // Setup output device\
    \ config\n        esp_codec_dev_cfg_t cfg = {\n            .dev_type = ESP_CODEC_DEV_TYPE_OUT,\n\
    \            .codec_mode = ESP_CODEC_DEV_WORK_MODE_DAC,\n            .sample_rate\
    \ = output_sample_rate_,\n            .bits_per_sample = ESP_CODEC_DEV_SAMPLE_TYPE_16BIT,\n\
    \            .channels = 2,\n        };\n\n        output_dev_ = esp_codec_dev_open(ctrl_if_,\
    \ &cfg);\n        if (output_dev_) {\n            esp_codec_dev_set_out_vol(output_dev_,\
    \ 60); // Default volume level\n        } else {\n            ESP_LOGE(\"ES8388\"\
    , \"Failed to open output device\");\n            return;\n        }\n\n     \
    \   // Enable PA if pin is defined\n        if (pa_pin_ != GPIO_NUM_NC && gpio_if_)\
    \ {\n            gpio_if_->setup(pa_pin_, AUDIO_GPIO_DIR_OUT);\n            gpio_if_->set(pa_pin_,\
    \ 1); // Active-high\n        }\n    } else {\n        // Disable output\n   \
    \     if (output_dev_) {\n            esp_codec_dev_close(output_dev_);\n    \
    \        output_dev_ = nullptr;\n        }\n\n        // Disable PA if pin is\
    \ defined\n        if (pa_pin_ != GPIO_NUM_NC && gpio_if_) {\n            gpio_if_->set(pa_pin_,\
    \ 0);\n        }\n    }\n}"
