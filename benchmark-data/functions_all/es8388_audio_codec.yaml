    \        gpio_set_level(reset_pin_, 1); // Release reset\n    }\n    \n    if\
    \ (mute_pin_ != GPIO_NUM_NC) {\n        gpio_config_t io_conf = {};\n        io_conf.pin_bit_mask\
    \ = (1ULL << mute_pin_);\n        io_conf.mode = GPIO_MODE_OUTPUT;\n        io_conf.pull_up_en\
    \ = GPIO_PULLUP_DISABLE;\n        io_conf.pull_down_en = GPIO_PULLDOWN_DISABLE;\n\
    \        io_conf.intr_type = GPIO_INTR_DISABLE;\n        gpio_config(&io_conf);\n\
    \        gpio_set_level(mute_pin_, 1); // Mute high (active low)\n    }\n    \n\
    \    if (pdn_pin_ != GPIO_NUM_NC) {\n        gpio_config_t io_conf = {};\n   \
    \     io_conf.pin_bit_mask = (1ULL << pdn_pin_);\n        io_conf.mode = GPIO_MODE_OUTPUT;\n\
    \        io_conf.pull_up_en = GPIO_PULLUP_DISABLE;\n        io_conf.pull_down_en\
    \ = GPIO_PULLDOWN_DISABLE;\n        io_conf.intr_type = GPIO_INTR_DISABLE;\n \
    \       gpio_config(&io_conf);\n        gpio_set_level(pdn_pin_, 1); // Power\
    \ down high (active low)\n    }\n    \n    // Configure I2S pins\n    i2s_pin_config_t\
    \ i2s_pin_config = {\n        .mck_io_num = clk_pin_,\n        .bck_io_num = GPIO_NUM_NC,\
    \  // Not used in standard mode\n        .ws_io_num = ws_pin_,\n        .data_out_num\
    \ = GPIO_NUM_NC, // Not used in standard mode\n        .data_in_num = GPIO_NUM_NC\
    \   // Not used in standard mode\n    };\n    \n    // Initialize I2S channel\n\
    \    i2s_channel_config_t i2s_ch_cfg = {\n        .id = (i2s_port_ == 0) ? I2S_NUM_0\
    \ : I2S_NUM_1,\n        .role = I2S_ROLE_MASTER,\n        .dma_desc_num = AUDIO_CODEC_DMA_DESC_NUM,\n\
    \        .dma_frame_num = AUDIO_CODEC_DMA_FRAME_NUM,\n        .sample_rate = sample_rate_,\n\
    \        .bits_per_sample = I2S_BITS_PER_SAMPLE_16BIT,\n        .channel_num =\
    \ I2S_CHANNEL_STEREO,\n        .pin_config = i2s_pin_config\n    };\n    \n  \
    \  // Create I2S channel\n    i2s_new_channel(&i2s_ch_cfg, &tx_handle_, &rx_handle_);\n\
    \    \n    // Initialize I2S channel in standard mode\n    i2s_channel_init_std_mode(tx_handle_,\
    \ &i2s_std_cfg_);\n    i2s_channel_init_std_mode(rx_handle_, &i2s_std_cfg_);\n\
    \    \n    // Initialize codec registers\n    // Set default volume levels\n \
    \   Write(ES8388_HPOUTCTRL1, 0x00); // HP_LVOL: 0dB\n    Write(ES8388_HPOUTCTRL2,\
    \ 0x00); // HP_RVOL: 0dB\n    Write(ES8388_SPKOUTCTRL1, 0x00); // SPK_LVOL: 0dB\n\
    \    Write(ES8388_SPKOUTCTRL2, 0x00); // SPK_RVOL: 0dB\n    \n    // Set default\
    \ gain\n    Write(ES8388_ADCGAIN, 0x00); // ADC Gain: 0dB\n    Write(ES8388_DACGAIN,\
    \ 0x00); // DAC Gain: 0dB\n    \n    // Enable codec\n    EnableInput();\n   \
    \ EnableOutput();\n}"
