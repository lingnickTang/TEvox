  graph-5-5: "void *i2c_master_handle,\n   i2c_port_t i2c_port,\n   int input_sample_rate,\n\
    \   int output_sample_rate,\n   gpio_num_t mclk_pin,\n   gpio_num_t bclk_pin,\n\
    \   gpio_num_t ws_pin,\n   gpio_num_t dout_pin,\n   gpio_num_t din_pin,\n   gpio_num_t\
    \ pa_pin,\n   uint8_t i2c_addr,\n   bool enable_pa\n   ```\n\n4. **Key Steps Required**:\n\
    \   - Validate that input and output sample rates match.\n   - Initialize I2C\
    \ control interface.\n   - Set up GPIO for Power Amplifier (PA), if enabled.\n\
    \   - Create I2S duplex channel configuration.\n   - Initialize the actual ES8388\
    \ codec driver.\n   - Finally, instantiate the input and output devices using\
    \ `esp_codec_dev_new`.\n\n---\n\n### Implementation:\n\n```cpp\n#include \"es8388_audio_codec.h\"\
    \n#include <assert.h>\n\n// Assuming these headers exist or will be linked appropriately\n\
    extern \"C\" {\n    #include \"audio_codec/gpio.h\"\n    #include \"audio_codec/i2c.h\"\
    \n    #include \"audio_codec/i2s.h\"\n    #include \"es8388/es8388.h\"\n    #include\
    \ \"esp_codec_dev/esp_codec_dev.h\"\n}\n\nEs8388AudioCodec::Es8388AudioCodec(\n\
    \    void *i2c_master_handle,\n    i2c_port_t i2c_port,\n    int input_sample_rate,\n\
    \    int output_sample_rate,\n    gpio_num_t mclk_pin,\n    gpio_num_t bclk_pin,\n\
    \    gpio_num_t ws_pin,\n    gpio_num_t dout_pin,\n    gpio_num_t din_pin,\n \
    \   gpio_num_t pa_pin,\n    uint8_t i2c_addr,\n    bool enable_pa)\n    : input_sample_rate_(input_sample_rate),\n\
    \      output_sample_rate_(output_sample_rate),\n      pa_enabled_(enable_pa),\n\
    \      pa_pin_(pa_pin) {\n\n    assert(input_sample_rate == output_sample_rate\
    \ && \"Input and Output Sample Rates must be equal\");\n\n    // Step 1: Initialize\
    \ I2C Control Interface\n    i2c_ctrl_ = audio_codec_new_i2c_ctrl(i2c_port, i2c_addr,\
    \ i2c_master_handle);\n    if (!i2c_ctrl_) {\n        return; // Failed to create\
    \ I2C controller\n    }\n\n    // Step 2: Initialize GPIO for PA if required\n\
    \    if (pa_enabled_) {\n        gpio_if_ = audio_codec_new_gpio();\n        if\
    \ (gpio_if_) {\n            gpio_if_->setup(pa_pin_, GPIO_MODE_OUTPUT);\n    \
    \        gpio_if_->set(pa_pin_, 0); // Initially off\n        }\n    } else {\n\
    \        gpio_if_ = nullptr;\n    }\n\n    // Step 3: Create Duplex I2S Channels\n\
    \    i2s_data_ = CreateDuplexChannels(mclk_pin, bclk_pin, ws_pin, dout_pin, din_pin);\n\
    \    if (!i2s_data_) {\n        return; // Failed to create I2S data interface\n\
    \    }\n\n    // Step 4: Initialize ES8388 Codec Driver\n    codec_driver_ = es8388_codec_new(i2c_ctrl_);\n\
    \    if (!codec_driver_) {\n        return; // Failed to initialize codec driver\n\
    \    }\n\n    // Step 5: Create Input & Output Device Handles\n    tx_dev_ = esp_codec_dev_new(codec_driver_,\
    \ i2s_data_);\n    rx_dev_ = esp_codec_dev_new(codec_driver_, i2s_data_);\n\n\
    \    if (!tx_dev_ || !rx_dev_) {\n        return; // Failed to create device handles\n\
    \    }\n}"
