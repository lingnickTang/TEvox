    brightness\", 75);\n\n    // 检查亮度值是否为0或过小，设置默认值\n    if (saved_brightness <= 0)\n\
    \    {\n        ESP_LOGW(TAG, \"Brightness value (%d) is too small, setting to\
    \ default (10)\", saved_brightness);\n        saved_brightness = 10; // 设置一个较低的默认值\n\
    \    }\n\n    SetBrightness(saved_brightness);\n}\n\nvoid Backlight::SetBrightness(uint8_t\
    \ brightness, bool permanent)\n{\n    if (brightness > 100)\n    {\n        brightness\
    \ = 100;\n    }\n\n    if (brightness_ == brightness)\n    {\n        return;\n\
    \    }\n\n    if (permanent)\n    {\n        Settings settings(\"display\", true);\n\
    \        settings.SetInt(\"brightness\", brightness);\n    }\n\n    target_brightness_\
    \ = brightness;\n    step_ = (target_brightness_ > brightness_) ? 1 : -1;\n\n\
    \    if (transition_timer_ != nullptr)\n    {\n        // 启动定时器，每 5ms 更新一次\n \
    \       esp_timer_start_periodic(transition_timer_, 5 * 1000);\n    }\n    ESP_LOGI(TAG,\
    \ \"Set brightness to %d\", brightness);\n}\n\nvoid Backlight::OnTransitionTimer()\n\
    {\n    if (brightness_ == target_brightness_)\n    {\n        esp_timer_stop(transition_timer_);\n\
    \        return;\n    }\n\n    brightness_ += step_;\n    SetBrightnessImpl(brightness_);\n\
    \n    if (brightness_ == target_brightness_)\n    {\n        esp_timer_stop(transition_timer_);\n\
    \    }\n}\n\nPwmBacklight::PwmBacklight(gpio_num_t pin, bool output_invert, uint32_t\
