    \ &transition_timer_));\n}\n\nBacklight::~Backlight()\n{\n    if (transition_timer_\
    \ != nullptr)\n    {\n        esp_timer_stop(transition_timer_);\n        esp_timer_delete(transition_timer_);\n\
    \    }\n}\n\nvoid Backlight::RestoreBrightness()\n{\n    // Load brightness from\
