  ground_truth: "void AudioService::PlaySound(const std::string_view& ogg) {\n   \
    \ if (!codec_->output_enabled()) {\n        esp_timer_stop(audio_power_timer_);\n\
    \        esp_timer_start_periodic(audio_power_timer_, AUDIO_POWER_CHECK_INTERVAL_MS\
    \ * 1000);\n        codec_->EnableOutput(true);\n    }\n\n    const uint8_t* buf\
    \ = reinterpret_cast<const uint8_t*>(ogg.data());\n    size_t size = ogg.size();\n\
    \    size_t offset = 0;\n\n    auto find_page = [&](size_t start)->size_t {\n\
    \        for (size_t i = start; i + 4 <= size; ++i) {\n            if (buf[i]\
    \ == 'O' && buf[i+1] == 'g' && buf[i+2] == 'g' && buf[i+3] == 'S') return i;\n\
    \        }\n        return static_cast<size_t>(-1);\n    };\n\n    bool seen_head\
    \ = false;\n    bool seen_tags = false;\n    int sample_rate = 16000; // 默认值\n\
    \n    while (true) {\n        size_t pos = find_page(offset);\n        if (pos\
    \ == static_cast<size_t>(-1)) break;\n        offset = pos;\n        if (offset\
    \ + 27 > size) break;\n\n        const uint8_t* page = buf + offset;\n       \
    \ uint8_t page_segments = page[26];\n        size_t seg_table_off = offset + 27;\n\
    \        if (seg_table_off + page_segments > size) break;\n\n        size_t body_size\
    \ = 0;\n        for (size_t i = 0; i < page_segments; ++i) body_size += page[27\
    \ + i];\n\n        size_t body_off = seg_table_off + page_segments;\n        if\
    \ (body_off + body_size > size) break;\n\n        // Parse packets using lacing\n\
    \        size_t cur = body_off;\n        size_t seg_idx = 0;\n        while (seg_idx\
    \ < page_segments) {\n            size_t pkt_len = 0;\n            size_t pkt_start\
    \ = cur;\n            bool continued = false;\n            do {\n            \
    \    uint8_t l = page[27 + seg_idx++];\n                pkt_len += l;\n      \
    \          cur += l;\n                continued = (l == 255);\n            } while\
    \ (continued && seg_idx < page_segments);\n\n            if (pkt_len == 0) continue;\n\
    \            const uint8_t* pkt_ptr = buf + pkt_start;\n\n            if (!seen_head)\
    \ {\n                // 解析OpusHead包\n                if (pkt_len >= 19 && std::memcmp(pkt_ptr,\
    \ \"OpusHead\", 8) == 0) {\n                    seen_head = true;\n          \
    \          \n                    // OpusHead结构：[0-7] \"OpusHead\", [8] version,\
    \ [9] channel_count, [10-11] pre_skip\n                    // [12-15] input_sample_rate,\
    \ [16-17] output_gain, [18] mapping_family\n                    if (pkt_len >=\
    \ 12) {\n                        uint8_t version = pkt_ptr[8];\n             \
    \           uint8_t channel_count = pkt_ptr[9];\n                        \n  \
    \                      if (pkt_len >= 16) {\n                            // 读取输入采样率\
    \ (little-endian)\n                            sample_rate = pkt_ptr[12] | (pkt_ptr[13]\
    \ << 8) | \n                                        (pkt_ptr[14] << 16) | (pkt_ptr[15]\
    \ << 24);\n                            ESP_LOGI(TAG, \"OpusHead: version=%d, channels=%d,\
    \ sample_rate=%d\", \n                                   version, channel_count,\
    \ sample_rate);\n                        }\n                    }\n          \
