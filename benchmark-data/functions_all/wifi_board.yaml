  tools-long: "void WifiBoard::StartWifiConfigMode()\n{\n    // Check if already in\
    \ config mode to prevent redundant operations\n    if (WifiManager::GetInstance().IsConfigMode())\
    \ {\n        ESP_LOGW(TAG, \"Already in WiFi config mode\");\n        return;\n\
    \    }\n\n    ESP_LOGI(TAG, \"Entering WiFi config mode\");\n\n    // Show notification\
    \ to user about entering config mode\n    GetDisplay()->ShowNotification(Lang::Strings::ENTERING_WIFI_CONFIG_MODE);\n\
    \n    // Reset application protocol to gracefully stop ongoing tasks\n    auto\
    \ &app = Application::GetInstance();\n    auto state = app.GetDeviceState();\n\
    \n    if (state == kDeviceStateSpeaking || state == kDeviceStateListening || state\
    \ == kDeviceStateIdle)\n    {\n        app.ResetProtocol();\n    }\n\n    // Create\
    \ a temporary task to handle the delayed transition\n    xTaskCreate([](void *arg)\n\
    \                {\n                    auto* board = static_cast<WifiBoard*>(arg);\n\
    \n                    // Allow some time for graceful shutdown of ongoing tasks\n\
    \                    vTaskDelay(pdMS_TO_TICKS(1000));\n\n                    //\
    \ Stop any active station mode before entering config mode\n                 \
    \   WifiManager::GetInstance().StopStation();\n\n                    // Stop the\
    \ connect timer to prevent reconnection attempts\n                    esp_timer_stop(board->connect_timer_);\n\
    \n                    // Actually start the WiFi configuration mode\n        \
    \            WifiManager::GetInstance().StartConfigMode();\n\n               \
    \     // Forward event to network layer\n                    board->OnNetworkEvent(NetworkEvent::WifiConfigModeEnter);\n\
    \n                    ESP_LOGI(TAG, \"WiFi config mode entered\");\n\n       \
    \             // Delete this temporary task as its job is done\n             \
    \       vTaskDelete(NULL);\n                }, \"wifi_cfg_enter\", 4096, this,\
    \ 2, NULL);\n}"
