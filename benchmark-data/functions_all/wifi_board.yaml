    \            break;\n            \n        case PowerSaveLevel::BALANCED:\n  \
    \          // Configure for balanced performance and power consumption\n     \
    \       #ifdef CONFIG_PM_ENABLE\n            {\n                esp_pm_config_esp32_t\
    \ pm_config = {\n                    .max_freq_mhz = 160, // Medium CPU frequency\n\
