    \        // Full peripheral activity\n            SetPeripheralPowerMode(PERIPHERAL_HIGH_PERFORMANCE);\n\
    \            break;\n    }\n    \n    // Notify other subsystems about the power\
    \ save level change\n    NotifyPowerSaveLevelChanged(level);\n    \n    // Wake\
