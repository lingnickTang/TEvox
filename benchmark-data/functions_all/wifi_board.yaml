    \                .light_sleep_enable = true  // Enable light sleep\n         \
    \       };\n                esp_pm_configure(&pm_config);\n            }\n   \
    \         #endif\n            \n            // Configure PowerSaveTimer for normal\
    \ operation\n            if (powerSaveTimer) {\n                powerSaveTimer->SetAggressiveMode(false);\n\
    \                powerSaveTimer->SetTimeouts(15000, 60000); // Moderate timeouts\n\
    \            }\n            \n            // Enable moderate WiFi power save\n\
