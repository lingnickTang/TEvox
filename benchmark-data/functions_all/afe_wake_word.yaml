    \                                                /* xClearOnExit= */ pdFALSE,\n\
    \                                                 /* xWaitForAllBits= */ pdTRUE,\n\
    \                                                 xMaxBlockTime);\n\n        if\
    \ ((uxBits & 0x01) == 0) {\n            continue; // Not yet started\n       \
    \ }\n\n        // Ensure AFE is properly initialized\n        if (!afe_iface_\
