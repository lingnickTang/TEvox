    \          if (i < frame.samples.size()) {\n                        signal_norm\
    \ += frame.samples[i] * frame.samples[i];\n                    }\n           \
    \     }\n                signal_norm = sqrt(signal_norm);\n                \n\
    \                if (pattern_norm > 0 && signal_norm > 0) {\n                \
    \    correlation /= (pattern_norm * signal_norm);\n                    \n    \
