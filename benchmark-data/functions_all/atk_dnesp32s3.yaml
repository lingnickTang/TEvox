    \        .sccb_port = I2C_NUM_0,\n    };\n    \n    ESP_ERROR_CHECK(sccb_init(&sccb_cfg));\n\
    \    \n    // Create and configure the camera driver instance\n    camera_config_t\
    \ camera_config = {\n        .pin_pwdn = GPIO_NUM_NC,\n        .pin_reset = GPIO_NUM_NC,\n\
    \        .pin_xclk = CAMERA_XCLK_PIN,\n        .pin_sscb_sda = CAMERA_SCCB_DAT_PIN,\n\
    \        .pin_sscb_scl = CAMERA_SCCB_CLK_PIN,\n        .pin_d0 = CAMERA_D0_PIN,\n\
    \        .pin_d1 = CAMERA_D1_PIN,\n        .pin_d2 = CAMERA_D2_PIN,\n        .pin_d3\
