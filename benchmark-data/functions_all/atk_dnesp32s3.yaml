    \    };\n    \n    camera_ = new Esp32Camera(&camera_config);\n}"
  SRP;: "void InitializeCamera() {\n    // Power down the camera first\n    xl9555_->SetOutputState(3,\
    \ 0);  // PWDN pin low (active low)\n    \n    // Reset the camera\n    xl9555_->SetOutputState(1,\
    \ 0);  // RESET pin low\n    vTaskDelay(pdMS_TO_TICKS(10));   // Wait 10ms\n \
    \   \n    // Power up sequence\n    xl9555_->SetOutputState(0, 1);  // Power enable\
    \ high\n    vTaskDelay(pdMS_TO_TICKS(10));   // Wait 10ms\n    \n    // Release\
    \ reset\n    xl9555_->SetOutputState(1, 1);  // RESET pin high\n    vTaskDelay(pdMS_TO_TICKS(10));\
    \   // Wait 10ms\n    \n    // Release power down\n    xl9555_->SetOutputState(3,\
    \ 1);  // PWDN pin high (inactive)\n    vTaskDelay(pdMS_TO_TICKS(10));   // Wait\
    \ 10ms\n    \n    // Configure DVP interface pins\n    // This would typically\
    \ involve setting up the correct GPIOs for DVP interface\n    // But since we're\
    \ using the Esp32Camera class, this is handled internally\n    \n    // Initialize\
    \ SCCB/I2C interface for camera control\n    // Using the same I2C bus as audio\
    \ codec but different address\n    esp_video_init_config_t camera_config = {\n\
    \        .i2c_config = {\n            .port = I2C_NUM_0,\n            .sda_io_num\
    \ = AUDIO_CODEC_I2C_SDA_PIN,\n            .scl_io_num = AUDIO_CODEC_I2C_SCL_PIN,\n\
    \            .slave_addr = 0x30,  // OV2640 default address\n            .clk_speed\
    \ = 100000, // 100kHz for SCCB\n            .bus_handle = i2c_bus_,\n        },\n\
    \        .pin = {\n            .pclk = CAMERA_PCLK_GPIO,\n            .vsync =\
    \ CAMERA_VSYNC_GPIO,\n            .href = CAMERA_HREF_GPIO,\n            .xclk\
    \ = CAMERA_XCLK_GPIO,\n            .reset = GPIO_NUM_NC, // Controlled via XL9555\n\
    \            .pwdn = GPIO_NUM_NC,  // Controlled via XL9555\n        },\n    \
    \    .xclk_freq_hz = 20000000, // 20MHz XCLK\n        .frame_size = CAMERA_FRAME_SIZE,\n\
    \        .pixel_format = CAMERA_PIXEL_FORMAT,\n        .jpeg_quality = CAMERA_JPEG_QUALITY,\n\
    \        .frame_count = CAMERA_FRAME_COUNT,\n    };\n    \n    // Create camera\
    \ instance\n    camera_ = new Esp32Camera(camera_config);\n    \n    // Additional\
    \ stabilization delay\n    vTaskDelay(pdMS_TO_TICKS(50));\n}"
