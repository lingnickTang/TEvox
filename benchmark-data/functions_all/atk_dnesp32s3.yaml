  eg-small;: "void ATK_DNESP32S3::InitializeCamera() {\n    // Configure power and\
    \ reset signals for the camera using the I/O expander\n    // Assuming we have\
    \ an I2C device for the IO expander\n    gpio_config_t io_conf = {};\n    io_conf.intr_type\
    \ = GPIO_INTR_DISABLE;\n    io_conf.mode = GPIO_MODE_OUTPUT;\n    io_conf.pin_bit_mask\
    \ = (1ULL << CAMERA_POWER_PIN) | (1ULL << CAMERA_RESET_PIN);\n    io_conf.pull_down_en\
    \ = GPIO_PULLDOWN_DISABLE;\n    io_conf.pull_up_en = GPIO_PULLUP_DISABLE;\n  \
    \  gpio_config(&io_conf);\n    \n    // Power on the camera module\n    gpio_set_level(CAMERA_POWER_PIN,\
    \ 1);\n    vTaskDelay(10 / portTICK_PERIOD_MS); // Wait for power to stabilize\n\
    \    \n    // Reset the camera module\n    gpio_set_level(CAMERA_RESET_PIN, 0);\n\
    \    vTaskDelay(10 / portTICK_PERIOD_MS);\n    gpio_set_level(CAMERA_RESET_PIN,\
    \ 1);\n    vTaskDelay(50 / portTICK_PERIOD_MS); // Wait for reset to complete\n\
    \    \n    // Set up the parallel data interface (DVP) with correct pin mappings\n\
    \    camera_config_t camera_config = {};\n    camera_config.pin_d0 = CAMERA_D0_PIN;\n\
    \    camera_config.pin_d1 = CAMERA_D1_PIN;\n    camera_config.pin_d2 = CAMERA_D2_PIN;\n\
    \    camera_config.pin_d3 = CAMERA_D3_PIN;\n    camera_config.pin_d4 = CAMERA_D4_PIN;\n\
    \    camera_config.pin_d5 = CAMERA_D5_PIN;\n    camera_config.pin_d6 = CAMERA_D6_PIN;\n\
    \    camera_config.pin_d7 = CAMERA_D7_PIN;\n    camera_config.pin_xclk = CAMERA_XCLK_PIN;\n\
    \    camera_config.pin_pclk = CAMERA_PCLK_PIN;\n    camera_config.pin_vsync =\
    \ CAMERA_VSYNC_PIN;\n    camera_config.pin_href = CAMERA_HREF_PIN;\n    camera_config.pin_sscb_sda\
    \ = CAMERA_SDA_PIN;\n    camera_config.pin_sscb_scl = CAMERA_SCL_PIN;\n    camera_config.xclk_freq_hz\
    \ = CAMERA_XCLK_FREQ;\n    camera_config.pixel_format = PIXFORMAT_YUV422; // or\
    \ PIXFORMAT_JPEG for JPEG format\n    camera_config.frame_size = FRAMESIZE_QVGA;\
    \ // Adjust as needed\n    camera_config.jpeg_quality = 10; // 0-63, lower is\
    \ higher quality\n    camera_config.fb_count = 2; // Number of frame buffers to\
    \ allocate\n    \n    // Initialize the camera with the configuration\n    esp_err_t\
    \ err = esp_camera_init(&camera_config);\n    if (err != ESP_OK) {\n        ESP_LOGE(TAG,\
    \ \"Camera initialization failed with error 0x%x\", err);\n        return;\n \
    \   }\n    \n    // Initialize SCCB/I2C control interface for camera communication\n\
    \    // This is typically handled internally by esp_camera_init(), but we can\
    \ verify\n    // that the I2C bus is properly configured for SCCB communication\n\
    \    \n    // Apply proper sequencing and delays for camera stabilization\n  \
    \  // Already handled with previous delays and initialization steps\n    \n  \
    \  // Create and configure the camera driver instance\n    // The camera driver\
    \ is already initialized above through esp_camera_init()\n    // We can now query\
    \ camera properties or start capturing frames\n    \n    ESP_LOGI(TAG, \"Camera\
    \ initialized successfully\");\n}"
  a3-small;: "void InitializeCamera() {\n    // Power up the camera module\n    //\
    \ According to the board design, camera power is controlled via XL9555 pin 8\n\
    \    xl9555_->SetOutputState(8, 1);\n    \n    // Add delay for power stabilization\n\
    \    esp_rom_delay_us(10000); // 10ms delay\n    \n    // Reset the camera module\n\
    \    // Reset signal is controlled via XL9555 pin 2\n    xl9555_->SetOutputState(2,\
    \ 0);  // Assert reset\n    esp_rom_delay_us(1000);         // 1ms delay\n   \
    \ \n    xl9555_->SetOutputState(2, 1);  // Deassert reset\n    esp_rom_delay_us(10000);\
    \        // 10ms delay\n    \n    // Configure DVP interface for camera\n    esp_video_init_config_t\
    \ camera_config = {};\n    camera_config.dvp = new esp_video_dvp_config_t();\n\
    \    \n    // Set up DVP configuration\n    camera_config.dvp->pin_vsync = GPIO_NUM_47;\n\
    \    camera_config.dvp->pin_href = GPIO_NUM_48;\n    camera_config.dvp->pin_pclk\
    \ = GPIO_NUM_45;\n    camera_config.dvp->pin_siod = GPIO_NUM_39;\n    camera_config.dvp->pin_sioc\
    \ = GPIO_NUM_38;\n    \n    // Data pins D0-D7\n    camera_config.dvp->pin_d0\
    \ = GPIO_NUM_4;\n    camera_config.dvp->pin_d1 = GPIO_NUM_5;\n    camera_config.dvp->pin_d2\
    \ = GPIO_NUM_6;\n    camera_config.dvp->pin_d3 = GPIO_NUM_7;\n    camera_config.dvp->pin_d4\
    \ = GPIO_NUM_8;\n    camera_config.dvp->pin_d5 = GPIO_NUM_9;\n    camera_config.dvp->pin_d6\
    \ = GPIO_NUM_10;\n    camera_config.dvp->pin_d7 = GPIO_NUM_11;\n    \n    // Set\
    \ up SCCB/I2C interface\n    camera_config.sccb = new esp_video_sccb_config_t();\n\
    \    camera_config.sccb->i2c_port = I2C_NUM_0;\n    camera_config.sccb->sda_io_num\
    \ = GPIO_NUM_39;\n    camera_config.sccb->scl_io_num = GPIO_NUM_38;\n    camera_config.sccb->clk_speed_hz\
    \ = 100000;\n    \n    // Initialize the camera\n    camera_ = new Esp32Camera(camera_config);\n\
    \    \n    // Clean up temporary config structures\n    delete camera_config.dvp;\n\
    \    delete camera_config.sccb;\n    \n    // Optional: Set default camera settings\n\
    \    if (camera_) {\n        // Enable vertical flip if needed (camera orientation)\n\
    \        // camera_->SetVFlip(false);\n        // Enable horizontal mirror if\
    \ needed (camera orientation)\n        // camera_->SetHMirror(false);\n    }\n\
    }"
