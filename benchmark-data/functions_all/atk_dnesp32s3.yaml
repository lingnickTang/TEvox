  eg;: "#include <driver/gpio.h>\n#include <freertos/FreeRTOS.h>\n#include <freertos/task.h>\n\
    #include <freertos/event_groups.h>\n\n// Assumed definitions based on typical\
    \ usage\n#define BOOT_BUTTON_GPIO     GPIO_NUM_0  // Commonly used boot button\n\
    #define DEBOUNCE_DELAY_MS    50          // Software debounce time\nextern EventGroupHandle_t\
    \ app_event_group;\n#define WIFI_CONFIG_BIT      BIT0\n#define CHAT_TOGGLE_BIT\
    \      BIT1\n#define APP_STARTED_BIT      BIT2        // To distinguish between\
    \ startup and runtime\n\nstatic void IRAM_ATTR boot_button_isr_handler(void* arg)\
    \ {\n    static TickType_t last_interrupt_time = 0;\n    TickType_t interrupt_time\
    \ = xTaskGetTickCountFromISR();\n\n    // Simple software debouncing\n    if ((interrupt_time\
    \ - last_interrupt_time) > pdMS_TO_TICKS(DEBOUNCE_DELAY_MS)) {\n        BaseType_t\
    \ xHigherPriorityTaskWoken = pdFALSE;\n\n        // Determine which mode to act\
    \ upon\n        EventBits_t bits = xEventGroupGetBitsFromISR(app_event_group);\n\
    \        if (!(bits & APP_STARTED_BIT)) {\n            // Startup phase -> Trigger\
    \ Wi-Fi Config\n            xEventGroupSetBitsFromISR(app_event_group, WIFI_CONFIG_BIT,\
    \ &xHigherPriorityTaskWoken);\n        } else {\n            // Normal mode ->\
    \ Toggle Chat\n            xEventGroupSetBitsFromISR(app_event_group, CHAT_TOGGLE_BIT,\
    \ &xHigherPriorityTaskWoken);\n        }\n\n        portYIELD_FROM_ISR(xHigherPriorityTaskWoken);\n\
    \    }\n    last_interrupt_time = interrupt_time;\n}\n\nvoid InitializeButtons()\
    \ {\n    // Configure the boot button GPIO\n    gpio_config_t io_conf = {};\n\
    \    io_conf.intr_type = GPIO_INTR_NEGEDGE;       // Trigger on falling edge (button\
    \ press)\n    io_conf.pin_bit_mask = (1ULL << BOOT_BUTTON_GPIO);\n    io_conf.mode\
    \ = GPIO_MODE_INPUT;\n    io_conf.pull_up_en = GPIO_PULLUP_ENABLE;\n    io_conf.pull_down_en\
    \ = GPIO_PULLDOWN_DISABLE;\n    gpio_config(&io_conf);\n\n    // Install GPIO\
    \ ISR Service\n    gpio_install_isr_service(ESP_INTR_FLAG_LEVEL3);\n\n    // Hook\
    \ ISR handler\n    gpio_isr_handler_add(BOOT_BUTTON_GPIO, boot_button_isr_handler,\
    \ NULL);\n}"
