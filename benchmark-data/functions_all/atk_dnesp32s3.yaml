    \ for ARM Cortex-M or similar microcontrollers\n#define SPI_BASE_ADDR 0x40013000\
    \  // Example base address for SPI1\n#define SPI_CR1       (*(volatile uint32_t*)(SPI_BASE_ADDR\
    \ + 0x00))\n#define SPI_CR2       (*(volatile uint32_t*)(SPI_BASE_ADDR + 0x04))\n\
    #define SPI_SR        (*(volatile uint32_t*)(SPI_BASE_ADDR + 0x08))\n#define SPI_DR\
    \        (*(volatile uint32_t*)(SPI_BASE_ADDR + 0x0C))\n\n// SPI Control Register\
    \ 1 bits\n#define SPI_CR1_SPE   (1 << 6)    // SPI Enable\n#define SPI_CR1_MSTR\
    \  (1 << 2)    // Master Mode\n#define SPI_CR1_SSM   (1 << 9)    // Software Slave\
    \ Management\n#define SPI_CR1_SSI   (1 << 8)    // Internal Slave Select\n\n//\
    \ SPI Control Register 2 bits\n#define SPI_CR2_SSOE  (1 << 2)    // SS Output\
    \ Enable\n\n// SPI Status Register bits\n#define SPI_SR_TXE    (1 << 1)    //\
    \ Transmit Buffer Empty\n#define SPI_SR_RXNE   (1 << 0)    // Receive Buffer Not\
    \ Empty\n\n// Function to initialize SPI\nvoid InitializeSpi(void)\n{\n    //\
    \ Disable SPI first\n    SPI_CR1 &= ~SPI_CR1_SPE;\n    \n    // Configure SPI\
    \ control register 1\n    SPI_CR1 = 0;\n    SPI_CR1 |= SPI_CR1_MSTR;     // Set\
    \ as master\n    SPI_CR1 |= SPI_CR1_SSM;      // Enable software slave management\n\
    \    SPI_CR1 |= SPI_CR1_SSI;      // Set internal slave select\n    \n    // Configure\
    \ SPI control register 2\n    SPI_CR2 = 0;\n    SPI_CR2 |= SPI_CR2_SSOE;     //\
    \ Enable SS output\n    \n    // Configure SPI clock prescaler (example: divide\
    \ by 4)\n    SPI_CR1 &= ~(0x7 << 3);      // Clear BR bits\n    SPI_CR1 |= (0x1\
    \ << 3);       // Set BR = 001 (divide by 4)\n    \n    // Configure data size\
    \ (16-bit)\n    SPI_CR1 &= ~(0xF << 11);     // Clear DFF bit\n    SPI_CR1 |=\
    \ (0x0 << 11);      // Set DFF = 0 (8-bit data)\n    \n    // Enable SPI\n   \
    \ SPI_CR1 |= SPI_CR1_SPE;\n    \n    // Wait for SPI to be ready\n    while (!(SPI_SR\
    \ & SPI_SR_TXE));\n}"
