    {\n    // Initialize GPIO pins for display control\n    GpioInit();\n    \n  \
    \  // Reset the display\n    GpioSetPin(ST7789_RST_PIN, 0);\n    for (volatile\
    \ int i = 0; i < 100000; i++);\n    GpioSetPin(ST7789_RST_PIN, 1);\n    for (volatile\
    \ int i = 0; i < 100000; i++);\n    \n    // Initialize SPI interface\n    SpiInit();\n\
    \    \n    // Send software reset command\n    SpiWriteByte(0x00); // DC pin low\
    \ for command\n    SpiWriteByte(ST7789_CMD_SWRESET);\n    for (volatile int i\
    \ = 0; i < 1000000; i++);\n    \n    // Exit sleep mode\n    SpiWriteByte(0x00);\
    \ // DC pin low for command\n    SpiWriteByte(ST7789_CMD_SLPOUT);\n    for (volatile\
    \ int i = 0; i < 1000000; i++);\n    \n    // Set color mode to 65K colors (16-bit)\n\
    \    SpiWriteByte(0x00); // DC pin low for command\n    SpiWriteByte(ST7789_CMD_COLMOD);\n\
