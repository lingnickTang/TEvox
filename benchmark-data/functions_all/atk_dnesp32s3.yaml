    \ control - configure display orientation\n    SpiWriteByte(0x00); // DC pin low\
    \ for command\n    SpiWriteByte(ST7789_CMD_MADCTL);\n    SpiWriteByte(0x00); //\
    \ Default orientation (no rotation, no mirror)\n    \n    // Enable display\n\
    \    SpiWriteByte(0x00); // DC pin low for command\n    SpiWriteByte(ST7789_CMD_DISPON);\n\
    \    for (volatile int i = 0; i < 100000; i++);\n    \n    // Configure display\
    \ object\n    display->width = DISPLAY_WIDTH;\n    display->height = DISPLAY_HEIGHT;\n\
    \    display->color_depth = 16;\n    display->buffer = NULL; // Buffer will be\
    \ allocated by application\n    \n    // Apply additional display settings\n \
    \   // Color inversion off\n    SpiWriteByte(0x00); // DC pin low for command\n\
    \    SpiWriteByte(0x20); // Color inversion command\n    SpiWriteByte(0x00); //\
    \ Off\n    \n    // Axis swapping and mirroring settings\n    SpiWriteByte(0x00);\
    \ // DC pin low for command\n    SpiWriteByte(ST7789_CMD_MADCTL);\n    SpiWriteByte(0x00);\
