  description: The `Ota::Upgrade` function performs a firmware upgrade by downloading
    a new firmware image from a given URL and writing it to the device's OTA update
    partition. It verifies the integrity of the new firmware header, checks version
    compatibility, and reports progress and speed during the download process. Upon
    successful completion, the device can be rebooted to apply the new firmware.
