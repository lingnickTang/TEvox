  description: The `Ota::MarkCurrentVersionValid` function validates the currently
    running firmware partition by marking it as valid if it is in a pending verification
    state. It skips validation for the factory partition and logs the process for
    debugging purposes. This ensures that the device will boot into the new firmware
    on subsequent startups unless a rollback is explicitly triggered.
