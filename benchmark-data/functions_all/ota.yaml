  description: The `Ota::Activate()` function sends an activation request to a remote
    server using HTTP POST to confirm and finalize a firmware update. It constructs
    the activation URL, prepares the payload, and handles the server's response to
    determine if the activation was successful. The function returns appropriate error
    codes based on the HTTP status received.
