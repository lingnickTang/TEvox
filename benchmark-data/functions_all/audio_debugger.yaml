    \ address: %s\", CONFIG_AUDIO_DEBUG_UDP_SERVER);\n        close(udp_sockfd_);\n\
    \        udp_sockfd_ = -1;\n        return;\n    }\n\n    ESP_LOGI(TAG, \"Initialized\
    \ UDP debugger to %s:%d\", CONFIG_AUDIO_DEBUG_UDP_SERVER, CONFIG_AUDIO_DEBUG_PORT);\n\
    #else\n    // If not enabled, explicitly set to invalid state\n    udp_sockfd_\
