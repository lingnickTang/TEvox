  Desc+workflow: "void Es8388AudioCodec::SetOutputVolume(int volume) {\n    const\
    \ char* TAG = \"AudioCodec\";\n\n    // Validate input volume\n    if (volume\
    \ < 0 || volume > 100) {\n        ESP_LOGW(TAG, \"Invalid volume level: %d\",\
    \ volume);\n        return;\n    }\n\n    // Scale volume to codec register range\
    \ (0x00 to 0xFF)\n    uint8_t vol_reg_value = static_cast<uint8_t>(volume * 2.55f);\n\
    \n    // Write to LOUT1 and ROUT1 registers\n    i2c_write_register(ES8388_ADDR,\
    \ 0x24, vol_reg_value); // LOUT1\n    i2c_write_register(ES8388_ADDR, 0x25, vol_reg_value);\
    \ // ROUT1\n\n    // Update internal state\n    output_volume_ = volume;\n\n \
    \   // Log the update\n    ESP_LOGI(TAG, \"Output volume set to %d%%\", volume);\n\
    \n    // Persist volume setting in NVS\n    nvs_handle_t nvs_handle;\n    esp_err_t\
    \ err = nvs_open(\"audio_settings\", NVS_READWRITE, &nvs_handle);\n    if (err\
    \ == ESP_OK) {\n        nvs_set_i32(nvs_handle, \"output_volume\", volume);\n\
    \        nvs_commit(nvs_handle);\n        nvs_close(nvs_handle);\n    } else {\n\
    \        ESP_LOGE(TAG, \"Failed to open NVS handle for saving volume\");\n   \
    \ }\n}"
