  tools-long: "virtual int Read(int16_t* dest, int samples) = 0;\n     ```\n   - This\
    \ means `InputData` will pass the data buffer and size from the vector to `Read(...)`.\n\
    \n3. **Buffer Handling**:\n   - The input vector is pre-resized by the caller\
    \ according to sample rate and channel configuration.\n   - We must check that\
    \ the vector is not empty before attempting to read into it.\n   - After calling\
    \ `Read(...)`, we should verify that at least some samples were successfully read\
    \ (i.e., return value > 0).\n\n4. **Error Checking**:\n   - Return `false` if\
    \ the vector is empty.\n   - Return `false` if `Read(...)` does not read any samples\
    \ (returns <= 0).\n   - Otherwise, return `true` upon successful reading.\n\n\
    ---\n\n### Final Implementation:\n\nFollowing all these guidelines, here is the\
    \ full implementation of `InputData`:\n\n```cpp\nbool AudioCodec::InputData(std::vector<int16_t>\
    \ &data)\n{\n    if (data.empty()) {\n        return false;\n    }\n\n    int\
    \ samples_read = Read(data.data(), static_cast<int>(data.size()));\n    return\
    \ samples_read > 0;\n}"
