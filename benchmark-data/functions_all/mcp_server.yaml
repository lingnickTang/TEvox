    \ cache 的特性。\n\n    // Backup the original tools list and restore it after adding\
    \ the common tools.\n    auto original_tools = std::move(tools_);\n    auto& board\
    \ = Board::GetInstance();\n\n    // Do not add custom tools here.\n    // Custom\
    \ tools must be added in the board's InitializeTools function.\n\n    AddTool(\"\
    self.get_device_status\",\n        \"Provides the real-time information of the\
    \ device, including the current status of the audio speaker, screen, battery,\
    \ network, etc.\\n\"\n        \"Use this tool for: \\n\"\n        \"1. Answering\
    \ questions about current condition (e.g. what is the current volume of the audio\
    \ speaker?)\\n\"\n        \"2. As the first step to control the device (e.g. turn\
    \ up / down the volume of the audio speaker, etc.)\",\n        PropertyList(),\n\
    \        [&board](const PropertyList& properties) -> ReturnValue {\n         \
    \   return board.GetDeviceStatusJson();\n        });\n\n    AddTool(\"self.audio_speaker.set_volume\"\
    , \n        \"Set the volume of the audio speaker. If the current volume is unknown,\
    \ you must call `self.get_device_status` tool first and then call this tool.\"\
    ,\n        PropertyList({\n            Property(\"volume\", kPropertyTypeInteger,\
    \ 0, 100)\n        }), \n        [&board](const PropertyList& properties) -> ReturnValue\
    \ {\n            auto codec = board.GetAudioCodec();\n            codec->SetOutputVolume(properties[\"\
    volume\"].value<int>());\n            return true;\n        });\n    \n    auto\
    \ backlight = board.GetBacklight();\n    if (backlight) {\n        AddTool(\"\
    self.screen.set_brightness\",\n            \"Set the brightness of the screen.\"\
    ,\n            PropertyList({\n                Property(\"brightness\", kPropertyTypeInteger,\
    \ 0, 100)\n            }),\n            [backlight](const PropertyList& properties)\
    \ -> ReturnValue {\n                uint8_t brightness = static_cast<uint8_t>(properties[\"\
    brightness\"].value<int>());\n                backlight->SetBrightness(brightness,\
    \ true);\n                return true;\n            });\n    }\n\n#ifdef HAVE_LVGL\n\
    \    auto display = board.GetDisplay();\n    if (display && display->GetTheme()\
    \ != nullptr) {\n        AddTool(\"self.screen.set_theme\",\n            \"Set\
    \ the theme of the screen. The theme can be `light` or `dark`.\",\n          \
    \  PropertyList({\n                Property(\"theme\", kPropertyTypeString)\n\
    \            }),\n            [display](const PropertyList& properties) -> ReturnValue\
    \ {\n                auto theme_name = properties[\"theme\"].value<std::string>();\n\
    \                auto& theme_manager = LvglThemeManager::GetInstance();\n    \
    \            auto theme = theme_manager.GetTheme(theme_name);\n              \
    \  if (theme != nullptr) {\n                    display->SetTheme(theme);\n  \
    \                  return true;\n                }\n                return false;\n\
    \            });\n    }\n\n    auto camera = board.GetCamera();\n    if (camera)\
    \ {\n        AddTool(\"self.camera.take_photo\",\n            \"Take a photo and\
    \ explain it. Use this tool after the user asks you to see something.\\n\"\n \
    \           \"Args:\\n\"\n            \"  `question`: The question that you want\
    \ to ask about the photo.\\n\"\n            \"Return:\\n\"\n            \"  A\
    \ JSON object that provides the photo information.\",\n            PropertyList({\n\
    \                Property(\"question\", kPropertyTypeString)\n            }),\n\
    \            [camera](const PropertyList& properties) -> ReturnValue {\n     \
    \           // Lower the priority to do the camera capture\n                TaskPriorityReset\
    \ priority_reset(1);\n\n                if (!camera->Capture()) {\n          \
    \          throw std::runtime_error(\"Failed to capture photo\");\n          \
    \      }\n                auto question = properties[\"question\"].value<std::string>();\n\
    \                return camera->Explain(question);\n            });\n    }\n#endif\n\
    \n    // Restore the original tools list to the end of the tools list\n    tools_.insert(tools_.end(),\
    \ original_tools.begin(), original_tools.end());\n}"
