  cursor: 'extern "C" void app_main(void) { ESP_LOGI(TAG, "Starting application...");

    // Initialize NVS flash (required for Settings) esp_err_t ret = nvs_flash_init();
    if (ret == ESP_ERR_NVS_NO_FREE_PAGES || ret == ESP_ERR_NVS_NEW_VERSION_FOUND)
    { // NVS partition was truncated and needs to be erased ESP_ERROR_CHECK(nvs_flash_erase());
    ret = nvs_flash_init(); } ESP_ERROR_CHECK(ret);

    // Initialize the default event loop (required for network and other ESP-IDF components)
    ESP_ERROR_CHECK(esp_event_loop_create_default());

    // Get Application instance and initialize auto& app = Application::GetInstance();
    app.Initialize();

    // Run the main event loop (this never returns) app.Run(); }'
